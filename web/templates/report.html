{% extends "base.html" %}

{% block title %}Report {{ run_id }}{% endblock %}

{% block content %}
<div class="card">
    <h2>Test Report: {{ run_id }}</h2>
    <div id="reportContent" hx-get="/api/runs/{{ run_id }}" hx-trigger="load">
        <p>Loading report...</p>
    </div>
</div>

<div id="htmlReport" style="display: none;">
    <iframe id="reportFrame" style="width: 100%; height: 80vh; border: none;"></iframe>
</div>
{% endblock %}

{% block scripts %}
<script>
    let pollCount = 0;
    
    function loadReport() {
        fetch(`/api/runs/{{ run_id }}`)
            .then(r => r.json())
            .then(data => {
                if (data.status === 'running') {
                    document.getElementById('reportContent').innerHTML = `
                        <div style="text-align: center; padding: 2rem;">
                            <div class="spinner" style="width: 40px; height: 40px;"></div>
                            <p style="margin-top: 1rem;">Test still running...</p>
                        </div>
                    `;
                    
                    if (pollCount < 60) {
                        pollCount++;
                        setTimeout(loadReport, 2000);
                    }
                    return;
                }
                
                if (data.status === 'failed') {
                    document.getElementById('reportContent').innerHTML = `
                        <div class="card" style="background: #f8d7da;">
                            <h3 style="color: #721c24;">Test Failed</h3>
                            <p>${data.error || 'Unknown error'}</p>
                        </div>
                    `;
                    return;
                }
                
                let html = `
                    <div class="stats-grid" style="margin-bottom: 2rem;">
                        <div class="stat-card">
                            <div class="stat-value">${data.total_tests}</div>
                            <div class="stat-label">Total Tests</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value status-success">${data.accepted}</div>
                            <div class="stat-label">Accepted</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value status-error">${data.rejected}</div>
                            <div class="stat-label">Rejected</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value status-warning">${data.anomalies}</div>
                            <div class="stat-label">Anomalies</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.gaps}</div>
                            <div class="stat-label">Validation Gaps</div>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 1rem;">
                        <strong>Target:</strong> ${data.target_url}<br>
                        <strong>Created:</strong> ${data.created_at}<br>
                        <strong>Completed:</strong> ${data.completed_at || 'N/A'}
                    </div>
                `;
                
                if (data.html_report) {
                    html += `
                        <div style="margin-top: 1rem;">
                            <a href="/api/runs/{{ run_id }}/report?format=html" target="_blank" class="btn btn-primary">
                                View Full HTML Report
                            </a>
                        </div>
                    `;
                }
                
                if (data.json_report) {
                    html += `
                        <div style="margin-top: 1rem;">
                            <a href="/api/runs/{{ run_id }}/report?format=json" target="_blank" class="btn">
                                View JSON Report
                            </a>
                        </div>
                    `;
                }
                
                document.getElementById('reportContent').innerHTML = html;
            });
    }
    
    loadReport();
</script>
{% endblock %}
